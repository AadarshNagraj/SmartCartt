<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60" fill="none">
  <!-- Cart speed lines (orange) -->
  <rect x="2" y="22" width="22" height="4" rx="2" fill="#F5A623"/>
  <rect x="6" y="30" width="16" height="4" rx="2" fill="#F5A623"/>
  <rect x="10" y="38" width="11" height="4" rx="2" fill="#F5A623"/>

  <!-- Cart body with S letterform (dark) -->
  <path d="M28 14 L52 14 Q56 14 56 18 L56 40 Q56 44 52 44 L32 44 Q28 44 28 40 Z" fill="#111111"/>
  <!-- Cart wheels -->
  <circle cx="34" cy="48" r="4" fill="#111111"/>
  <circle cx="48" cy="48" r="4" fill="#111111"/>
  <!-- S shape inside cart (white) -->
  <path d="M38 22 Q38 19 42 19 Q46 19 46 23 Q46 26 40 27 Q36 28 36 32 Q36 36 40 36 Q44 36 44 33" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- "smart" text -->
  <text x="62" y="36" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#111111">smart</text>
  <!-- "cart" text in orange -->
  <text x="113" y="36" font-family="Arial, sans-serif" font-weight="700" font-size="18" fill="#F5A623">cart</text>
  <!-- ".sbs" in smaller gray -->
  <text x="152" y="36" font-family="Arial, sans-serif" font-weight="700" font-size="12" fill="#888888">.sbs</text>
  <!-- tagline -->
  <text x="62" y="48" font-family="Arial, sans-serif" font-weight="400" font-size="8" fill="#F5A623" letter-spacing="1">SHOP SMART. LIVE BETTER.</text>
</svg>
